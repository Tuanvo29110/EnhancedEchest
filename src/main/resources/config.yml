# EnhancedEchest configuration

# Language locale to load from language/<locale>/
# Bundled locales: en_US (English), vi_VN (Tiếng Việt).
# Add your own by copying a folder under language/ and translating it.
language: en_US

enderchest:
  # Slot count of the chest auto-created the first time a player ever opens their ender chest.
  # Must be a multiple of 9, between 9 and 54. Invalid values are rounded to the nearest valid size.
  default-size: 54

  # Which chest-management buttons players may use in the "Edit mode" menu (Rename / Choose icon / Sort).
  # These are GLOBAL switches: they apply to every player the same way, not per-player and not per-chest.
  # Turning one off simply hides its button from the menu; existing names/icons are kept, just no longer
  # editable.
  features:
    # Let players give a chest a custom display name.
    rename: true
    # Let players pick an item to show as a chest's icon in the list.
    icon: true
    # Let players auto-sort a chest's contents: identical items are merged into full stacks and the
    # whole chest is reordered by item type/name. Off by default.
    sort: false
    # Smallest gap between two sorts by the same player, so the Sort button can't be spammed (each sort
    # re-reads and re-writes the chest). Time format: 20s, 5m, 1h, ... Set to 0s to disable the cooldown.
    sort-cooldown: 10s

permission-chests:
  # Grant ender chests from permissions of the form:
  #   enhancedechest.additional_amount.<count>.slot.<size>
  #   e.g. enhancedechest.additional_amount.2.slot.54  -> two 54-slot chests.
  # Matching permissions STACK (summed per size). Losing a permission removes exactly that many
  # chests of that size; any items they held spill into a temporary chest (recoverable in /eclist).
  # Synced every time the player opens their ender chest. Players always keep at least one regular
  # (base) chest — permissions never create, delete or override it.
  enabled: true

temp-enderchest:
  # When a chest is shrunk, deleted (without 'force'), or expires with items still inside, those
  # items are moved into a temporary ender chest that disappears once emptied or once it expires.
  #
  # Time format: 20s, 5m, 1h, or complex 1d_2h_30m_15s. Units: s m h d w mo y (mo = 30d, y = 365d).
  # Lifetime of a temp chest created on shrink/delete/expire-with-items.
  expiry: 24h
  # How often the plugin scans for expired chests.
  check-interval: 5m
  # Sound played to a player who tries to deposit into a take-only temporary chest.
  deny-sound:
    # Set to false to play no sound.
    enabled: true
    # Any Minecraft sound id. Default is the villager "no" grunt.
    key: minecraft:entity.villager.no

database:
  # NOTE: changes to ANY setting in this 'database' section require a FULL SERVER RESTART.
  # /ee reload will NOT apply them — the connection pool is built once at startup and is kept on the
  # old settings, because rebuilding it live could drop connections mid-save and risk item dupes.
  #
  # Storage backend: sqlite | mysql | mariadb | postgres
  type: sqlite
  # SQLite: path relative to plugin data folder (default: enderchests.db)
  sqlite-file: enderchests.db
  # MySQL/MariaDB default port: 3306 | Postgres default port: 5432
  host: localhost
  port: 3306
  database: enhancedechest
  username: root
  password: ""
  pool-size: 10

backup:
  # Automatically saves a copy of all ender chest data on a timer, so you can restore it if the
  # database ever gets corrupted or something goes wrong.
  #
  # IMPORTANT: this only works with SQLite (the default storage). If you use mysql/mariadb/postgres,
  # the plugin will NOT back up for you — use your database server's own backup tools instead.
  enabled: true

  # How often to make a backup.
  # Examples: 30m = every 30 minutes, 6h = every 6 hours, 1d = once a day.
  # (units: s = seconds, m = minutes, h = hours, d = days, w = weeks, mo = months, y = years)
  interval: 6h

  # How many backups to keep. Once there are more than this, the OLDEST ones are deleted
  # automatically so the folder doesn't grow forever.
  # Example: 10 keeps your 10 most recent backups. Use 0 to keep ALL backups and never delete any.
  keep: 10

  # Make one extra backup right when the server starts up, on top of the normal timer.
  on-startup: false

  # Folder (inside plugins/EnhancedEchest/) where backup files are saved.
  # Each backup is named like: enderchests-20260625-143000.db  (date and time it was made).
  folder: backups

migration:
  # When true: un-migrated players have their vanilla enderchest imported on join.
  # Note: changing this to true and reloading does NOT migrate players already online —
  # migration only fires on the join event, so current players must rejoin to be migrated
  # (or use "/ee migrate vanilla <player>" / "/ee migrate vanilla all" for online players).
  enabled: false
