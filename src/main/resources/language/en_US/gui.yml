# GUI / dialog text for EnhancedEchest.
# Format is auto-detected per line: a line containing '<' is MiniMessage, otherwise legacy '&' codes.

enderchest:
  # Inventory window titles. {index} = chest number.
  title: 'Ender Chest'
  title-numbered: 'Ender Chest {index}'
  title-temp: '<red>⚠ <reset>Temporary Storage'

dialog:

  # ===== List dialog (one button per owned chest) =====
  list-title: '<white>Your Ender Chests'
  list-body: '<white>Select a chest to open or manage.'
  # When ticked, clicking a chest opens its management menu; unticked (default), opens it directly.
  edit-mode: '<white>Edit mode (manage chests on click)'
  close: '<red>✖ <white>Close'
  # Hover tooltip on each chest button. {size} = slot count.
  slots: '<white>{size} slots'
  # Appended to the main chest's label so the list marks which chest /ec opens.
  main-tag: '<gold>★'
  # Static "time remaining" snapshot on chests that expire. {time} e.g. "23h 45m".
  expires-in: '<white>Expires in {time}'

  # ===== Admin view list (/ee view <player> [list]) =====
  # {player} = the owner whose chests are being viewed.
  admin-list-title: '<white>{player}''s Ender Chests'
  admin-list-body: '<white>Select a chest to view.'

  # ===== Detail dialog (a single chest) =====
  # Centred text under the title. {size} = slot count.
  detail-body: '<white>{size} slots'
  open: '<white>Open'
  open-desc: '<white>Open this chest.'
  set-main: '<gold>★ <white>Set as main'
  set-main-desc: '<white>Make this the chest opened by /ec and by right-clicking an ender chest block.'
  unset-main: '<gray>☆ <white>Unset main'
  unset-main-desc: '<white>Stop using this chest as your main. /ec will open the management menu again.'
  rename: '<white>Rename'
  rename-desc: '<white>Give this chest a custom display name.'
  choose-icon: '<white>Choose icon'
  choose-icon-desc: '<white>Pick an item to show as this chest''s icon in the list.'
  # Returns to the previous dialog; reused by the icon picker.
  back: '<white>Back'

  # ===== Rename dialog =====
  rename-body: '<white>Enter a new display name for this chest.'
  name-label: '<white>Display name'
  save-name: '<green>✔ <white>Save'
  cancel: '<red>✖ <white>Cancel'

  # ===== Icon picker dialog =====
  icon-title: '<white>Choose Icon'
  # {count} = number of matching items (scroll the list to browse).
  icon-body: '<white>{count} items — type a name and press Search to filter. Scroll to browse.'
  icon-search-label: '<white>Search'
  icon-search: '<white>Search'
  icon-default: '<white>Default'
  icon-default-desc: '<white>Use the default ender-chest icon.'
