# EnhancedEChest – messages.yml
# All player-facing chat messages and the plugin prefix.
#
#   COLOR FORMAT:
#   - Legacy '&' codes are used throughout, including hex: &#RRGGBB
#   - {prefix} is replaced with the prefix below
#   - {placeholders} like {player}, {index}, {size} are filled in at runtime
#
#   PALETTE:
#   - &#FF4444  errors
#   - &#F0C857  warnings / caution
#   - &a        success
#   - &e / &f   highlighted values
#   - &7 / &8   muted / separators

prefix: '&#9B59B6EɴʜᴀɴᴄᴇᴅEᴄʜᴇsᴛ &8⏩ &r'

# ──────────────────────────────────────────────────────
#                 Command / Player
# ──────────────────────────────────────────────────────
command:
  not-player: '{prefix}&#FF4444Only players can use the ender chest.'

# ──────────────────────────────────────────────────────
#                 Ender Chest
# ──────────────────────────────────────────────────────
chest:
  no-permission: '{prefix}&#FF4444You do not have permission to use the ender chest.'
  load-failed: '{prefix}&#FF4444Could not load your ender chest. Please contact an admin.'
  codec-failed: '{prefix}&#FF4444Your ender chest data could not be read. Please contact an admin.'
  not-found: '{prefix}&#FF4444That ender chest no longer exists.'
  none: '{prefix}&#F0C857You do not have any ender chests yet.'

# ──────────────────────────────────────────────────────
#                 Migration
# ──────────────────────────────────────────────────────
migrate:
  no-players: '{prefix}&#F0C857No players are online.'
  complete: '{prefix}&7Migration complete: &a{migrated} migrated&7, &#F0C857{skipped} already done.'
  player-offline: '{prefix}&e{player} &7is not online.'
  success: '{prefix}&aMigrated &e{player}&a successfully.'
  already-done: '{prefix}&e{player} &7was already migrated.'

# ──────────────────────────────────────────────────────
#                 Admin
# ──────────────────────────────────────────────────────
admin:
  reload-success: '{prefix}&aConfiguration reloaded.'
  player-not-found: '{prefix}&#FF4444Player &e{player}&#FF4444 was not found.'
  invalid-size: '{prefix}&#FF4444Size must be a multiple of 9 between 9 and 54.'
  chest-not-found: '{prefix}&#FF4444{player} has no ender chest with index &e{index}&#FF4444.'
  chest-added: '{prefix}&aAdded Ender Chest &e{index}&a (&e{size}&a slots) to &e{player}&a.'
  chest-resized: '{prefix}&aResized &e{player}&a ender chest &e{index}&a to &e{size}&a slots.'
  chest-deleted: '{prefix}&aDeleted ender chest &e{index}&a of &e{player}&a.'

# ──────────────────────────────────────────────────────
#                 Update Notice
# ──────────────────────────────────────────────────────
update:
  available: '{prefix}&#F0C857New update available! &7(&f{current} &8→ &a{latest}&7)'
  # Kept in MiniMessage so the download URL stays clickable (legacy '&' cannot do click events).
  download: '{prefix}<gray>Download: <click:open_url:{url}><aqua>{url}</aqua></click>'
