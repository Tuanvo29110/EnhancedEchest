# ============================================================================
#  Chat messages for EnhancedEchest
#  {prefix} is replaced with the value below. Lines are mostly plain white text;
#  only dynamic values are written inline so messages read as full sentences.
#  A line containing '<' is parsed as MiniMessage, otherwise as legacy '&' codes.
# ============================================================================

prefix: '&#9B59B6EnhancedEchest &8⏩ &r'

command:
  not-player: '{prefix}&fOnly players can use the ender chest.'

chest:
  load-failed: '{prefix}&fCould not load your ender chest. Please contact an administrator.'
  not-found: '{prefix}&fThat ender chest no longer exists.'
  # Shown (on the action bar) when a player tries to put an item into a temporary chest.
  temp-take-only: '&cThis is a temporary chest. You can only take items out, not put them in.'
  # Shown to an admin who tries to open a chest already in use (Folia allows only one viewer per chest).
  in-use: '{prefix}&fThat ender chest is currently in use. Please try again in a moment.'
  # Action bar shown to an admin who may view but not edit another player''s chest (no edit permission).
  view-only: '&7Read-only — you can view this chest but not change its contents.'
  # Shown after the Sort button finishes tidying a chest.
  sorted: '{prefix}&fChest sorted.'
  # Shown when Sort is clicked again before its cooldown elapses. {time} = remaining time, e.g. "2s".
  sort-cooldown: '{prefix}&fPlease wait {time} before sorting again.'
  # Shown when a rename is rejected because the name contains a word from enderchest.features.rename-blacklist.
  rename-blocked: '{prefix}&cThat name is not allowed. Please choose a different one.'

migrate:
  no-players: '{prefix}&fNo players are online.'
  complete: '{prefix}&fMigration complete. {migrated} migrated, {skipped} already done.'
  player-offline: '{prefix}&f{player} is not online.'
  success: '{prefix}&fMigrated {player} successfully.'
  already-done: '{prefix}&f{player} was already migrated.'
  failed: '{prefix}&fMigration failed for {player}. Check the console for details.'
  # Importing from another vault plugin — {source} is the plugin name (AxVaults, PlayerVaultsX).
  no-source: '{prefix}&fNo {source} data found to import.'
  started: '{prefix}&fImporting vaults from {source}… this runs in the background.'
  import-done: '{prefix}&f{source} import done. {players} player(s), {vaults} vault(s) imported, {skipped} skipped, {failed} failed.'
  import-player-done: '{prefix}&f{source} import for {player}: {vaults} vault(s) imported, {skipped} skipped.'
  import-failed: '{prefix}&f{source} import failed: {error}'

# Database-to-database import (/ee import) — copies an old backend into the active one.
import:
  # Validation of the dialog form before anything runs.
  missing-sqlite-file: '{prefix}&fEnter the SQLite database file to import from.'
  missing-remote-fields: '{prefix}&fEnter the host, database and username of the source database.'
  invalid-port: '{prefix}&fThe source database port is not valid.'
  invalid-type: '{prefix}&fChoose a source database type.'
  # Pre-flight guards.
  players-online: '{prefix}&fImport can only run when no other players are online. Ask everyone else to leave and try again.'
  same-database: '{prefix}&fThe source is the same database the plugin is already using. Point it at the OLD backend instead.'
  dest-not-empty: '{prefix}&fThe active database already has {count} chest(s). Import only works into a fresh, empty database.'
  # Progress + outcome. {source} = chosen type; {players}/{chests} = rows copied.
  started: '{prefix}&fImporting from the {source} database… this runs in the background.'
  done: '{prefix}&fImport complete. Copied {players} player(s) and {chests} chest(s) into the active database.'
  failed: '{prefix}&fImport failed and nothing was written. Reason: {error}'

admin:
  reload-success: '{prefix}&fConfiguration reloaded.'
  player-not-found: '{prefix}&fPlayer {player} was not found.'
  no-permission: '{prefix}&fYou do not have permission to do that.'
  # Admin "Clear chest" action from /ee view. {player} = owner, {index} = chest number.
  chest-cleared: '{prefix}&fEmptied ender chest {index} of {player}.'
  invalid-size: '{prefix}&fSize must be a multiple of 9 between 9 and 54.'
  invalid-duration: '{prefix}&fInvalid duration "{duration}". Use a value like 20s, 5m, 1h, 7d, or 1d_2h_30m.'
  chest-not-found: '{prefix}&f{player} has no ender chest with index {index}.'
  # /ee resize on a permission-granted chest — those are managed by permissions, not admin commands.
  cannot-modify-perm: '{prefix}&fEnder chest {index} of {player} is granted by a permission and cannot be modified.'
  # /ee resize on the base chest while its size is set by an enhancedechest.default_size.<size> permission.
  cannot-modify-default-size: '{prefix}&fEnder chest {index} of {player} is sized by a permission and cannot be resized.'
  # /ee view <player> — the target owns no chests yet, so there is nothing to open.
  view-no-chests: '{prefix}&f{player} does not have any ender chests yet.'
  chest-added: '{prefix}&fAdded ender chest {index} with {size} slots to {player}.'
  chest-added-expiring: '{prefix}&fAdded ender chest {index} with {size} slots to {player}. It will expire in {duration}.'
  chests-added: '{prefix}&fAdded {count} ender chests ({range}) with {size} slots to {player}.'
  chests-added-expiring: '{prefix}&fAdded {count} ender chests ({range}) with {size} slots to {player}. They will expire in {duration}.'
  chest-resized: '{prefix}&fResized ender chest {index} of {player} to {size} slots.'
  # /ee delete <player> <count> [force] — removes the newest chests; the first chest is always kept.
  no-chests-deletable: '{prefix}&f{player} has only their first ender chest, which cannot be deleted.'
  chest-deleted-newest: '{prefix}&fDeleted the newest ender chest of {player}. Its items were discarded.'
  chest-deleted-newest-spilled: '{prefix}&fDeleted the newest ender chest of {player}. Any items it held were moved to a temporary chest.'
  chests-deleted-newest: '{prefix}&fDeleted the {count} newest ender chests of {player}. Their items were discarded.'
  chests-deleted-newest-spilled: '{prefix}&fDeleted the {count} newest ender chests of {player}. Any items they held were moved to temporary chests.'
  # /ee transfer <from> <to> <index|name|all> [override|temp] — move chests to a switched account.
  transfer-usage: '{prefix}&fUsage: /ee transfer <from> <to> <#index | name | all> [override | temp].'
  transfer-same-player: '{prefix}&fThe source and destination players must be different.'
  transfer-not-found: '{prefix}&f{player} has no ender chest matching "{target}".'
  transfer-no-source: '{prefix}&f{player} has no ender chests to transfer.'
  # Shown when the destination already has items in chests this transfer would replace and no flag was given.
  transfer-needs-flag: '{prefix}&f{player} already has items in chests this would replace. Add "override" to discard them or "temp" to move them to temporary storage.'
  transfer-failed: '{prefix}&fThe transfer failed. No chests were changed. Please check the console.'
  transfer-complete-all: '{prefix}&fTransferred all {count} ender chest(s) from {from} to {to}.'
  transfer-complete-one: '{prefix}&fTransferred {count} ender chest from {from} to {to}.'
  transfer-displaced-temp: '{prefix}&f{player}''s previous items were moved to temporary storage.'
  transfer-displaced-override: '{prefix}&f{player}''s previous items were discarded.'

update:
  available: '{prefix}&fA new update is available. You are on {current}, and the latest is {latest}.'
  # Kept in MiniMessage so the download URL stays clickable (legacy '&' cannot do click events).
  download: '{prefix}<gray>Download: <click:open_url:{url}><aqua>{url}</aqua></click>'
