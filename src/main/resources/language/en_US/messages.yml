# ============================================================================
#  Chat messages for EnhancedEchest
#  {prefix} is replaced with the value below. Lines are mostly plain white text;
#  only dynamic values are written inline so messages read as full sentences.
#  A line containing '<' is parsed as MiniMessage, otherwise as legacy '&' codes.
# ============================================================================

prefix: '&#9B59B6EnhancedEchest &8⏩ &r'

command:
  not-player: '{prefix}&fOnly players can use the ender chest.'

chest:
  load-failed: '{prefix}&fCould not load your ender chest. Please contact an administrator.'
  codec-failed: '{prefix}&fYour ender chest data could not be read. Please contact an administrator.'
  not-found: '{prefix}&fThat ender chest no longer exists.'
  unknown: '{prefix}&fNo ender chest matches "{query}".'
  none: '{prefix}&fYou do not have any ender chests yet.'
  # Shown (on the action bar) when a player tries to put an item into a temporary chest.
  temp-take-only: '&cThis is a temporary chest. You can only take items out, not put them in.'
  # Shown to an admin who tries to open a chest already in use (Folia allows only one viewer per chest).
  in-use: '{prefix}&fThat ender chest is currently in use. Please try again in a moment.'
  # Action bar shown to an admin who may view but not edit another player''s chest (no edit permission).
  view-only: '&7Read-only — you can view this chest but not change its contents.'

migrate:
  no-players: '{prefix}&fNo players are online.'
  complete: '{prefix}&fMigration complete. {migrated} migrated, {skipped} already done.'
  player-offline: '{prefix}&f{player} is not online.'
  success: '{prefix}&fMigrated {player} successfully.'
  already-done: '{prefix}&f{player} was already migrated.'

admin:
  reload-success: '{prefix}&fConfiguration reloaded.'
  player-not-found: '{prefix}&fPlayer {player} was not found.'
  invalid-size: '{prefix}&fSize must be a multiple of 9 between 9 and 54.'
  invalid-duration: '{prefix}&fInvalid duration "{duration}". Use a value like 20s, 5m, 1h, 7d, or 1d_2h_30m.'
  chest-not-found: '{prefix}&f{player} has no ender chest with index {index}.'
  # /ee view <player> — the target owns no chests yet, so there is nothing to open.
  view-no-chests: '{prefix}&f{player} does not have any ender chests yet.'
  chest-added: '{prefix}&fAdded ender chest {index} with {size} slots to {player}.'
  chest-added-expiring: '{prefix}&fAdded ender chest {index} with {size} slots to {player}. It will expire in {duration}.'
  chests-added: '{prefix}&fAdded {count} ender chests ({range}) with {size} slots to {player}.'
  chests-added-expiring: '{prefix}&fAdded {count} ender chests ({range}) with {size} slots to {player}. They will expire in {duration}.'
  chest-resized: '{prefix}&fResized ender chest {index} of {player} to {size} slots.'
  # /ee delete <player> <count> [force] — removes the newest chests; the first chest is always kept.
  no-chests-deletable: '{prefix}&f{player} has only their first ender chest, which cannot be deleted.'
  chest-deleted-newest: '{prefix}&fDeleted the newest ender chest of {player}. Its items were discarded.'
  chest-deleted-newest-spilled: '{prefix}&fDeleted the newest ender chest of {player}. Any items it held were moved to a temporary chest.'
  chests-deleted-newest: '{prefix}&fDeleted the {count} newest ender chests of {player}. Their items were discarded.'
  chests-deleted-newest-spilled: '{prefix}&fDeleted the {count} newest ender chests of {player}. Any items they held were moved to temporary chests.'

update:
  available: '{prefix}&fA new update is available. You are on {current}, and the latest is {latest}.'
  # Kept in MiniMessage so the download URL stays clickable (legacy '&' cannot do click events).
  download: '{prefix}<gray>Download: <click:open_url:{url}><aqua>{url}</aqua></click>'
