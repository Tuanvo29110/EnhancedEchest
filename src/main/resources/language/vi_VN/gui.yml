# Văn bản GUI / hộp thoại cho EnhancedEchest.
# Định dạng được tự nhận diện theo từng dòng: dòng chứa '<' là MiniMessage, ngược lại dùng mã '&' cũ.

enderchest:
  # Tiêu đề cửa sổ kho đồ. {index} = số thứ tự rương.
  title: 'Rương Ender'
  title-numbered: 'Rương Ender {index}'
  title-temp: '<red>⚠ <reset>Rương Tạm'

dialog:

  # ===== Hộp thoại danh sách (mỗi rương sở hữu là một nút) =====
  list-title: '<white>Các Rương Ender Của Bạn'
  list-body: '<white>Chọn một rương để mở hoặc chỉnh sửa.'
  # Khi được tích, bấm vào rương sẽ mở menu chỉnh sửa; khi bỏ tích (mặc định), mở rương trực tiếp.
  edit-mode: '<white>Chế độ chỉnh sửa (bấm để chỉnh sửa rương)'
  close: '<red>✖ <white>Đóng'
  # Chú thích khi rê chuột lên mỗi nút rương. {size} = số ô.
  slots: '<white>{size} ô'
  # Thêm vào nhãn của rương chính để danh sách đánh dấu rương mà /ec sẽ mở.
  main-tag: '<gold>★'
  # Ảnh chụp "thời gian còn lại" tĩnh trên các rương sẽ hết hạn. {time} ví dụ "23h 45m".
  expires-in: '<white>Hết hạn sau {time}'

  # ===== Danh sách xem của quản trị viên (/ee view <player> [list]) =====
  # {player} = chủ rương đang được xem.
  admin-list-title: '<white>Các Rương Ender Của {player}'
  admin-list-body: '<white>Chọn một rương để xem.'

  # ===== Hộp thoại chi tiết của quản trị viên (mỗi rương, /ee view) =====
  # Nút Dọn chỉ hiện với quản trị viên có quyền enhancedechest.admin.clear. Thẻ (Admin) đỏ đánh dấu đây là
  # hành động đặc quyền; nút này mở hộp xác nhận trước khi xóa.
  admin-clear: '<red>(Admin) <white>Dọn rương'
  admin-clear-desc: '<white>Xóa vĩnh viễn mọi vật phẩm trong rương này.'
  # Hộp xác nhận: tiêu đề riêng + nội dung cảnh báo, rồi cặp đồng ý/hủy rõ ràng (✔ xác nhận / ✖ hủy).
  admin-clear-confirm-title: '<white>Dọn rương này?'
  admin-clear-confirm-body: '<gray>Mọi vật phẩm trong rương sẽ bị <red>xóa vĩnh viễn</red>.<newline><gray>Không thể hoàn tác.'
  admin-clear-confirm: '<green>✔ <white>Dọn rương'

  # ===== Hộp thoại chi tiết (một rương duy nhất) =====
  # Văn bản căn giữa dưới tiêu đề. {size} = số ô.
  detail-body: '<white>{size} ô'
  open: '<white>Mở'
  open-desc: '<white>Mở rương này.'
  set-main: '<gold>★ <white>Đặt làm rương chính'
  set-main-desc: '<white>Đặt đây làm rương được mở bằng /ec và khi chuột phải vào khối rương ender.'
  unset-main: '<gray>☆ <white>Bỏ rương chính'
  unset-main-desc: '<white>Ngừng dùng rương này làm rương chính. /ec sẽ mở lại menu chỉnh sửa.'
  rename: '<white>Đổi tên'
  rename-desc: '<white>Đặt tên hiển thị tùy chỉnh cho rương này.'
  choose-icon: '<white>Chọn biểu tượng'
  choose-icon-desc: '<white>Chọn một vật phẩm làm biểu tượng cho rương này trong danh sách.'
  # Nút Sắp xếp — chỉ hiện khi enderchest.features.sort được bật trong config.yml.
  sort: '<white>Sắp xếp'
  sort-desc: '<white>Gộp các vật phẩm giống nhau thành stack và sắp xếp lại rương theo loại vật phẩm.'
  # Quay lại hộp thoại trước; dùng lại cho bộ chọn biểu tượng.
  back: '<white>Quay lại'

  # ===== Hộp thoại đổi tên =====
  rename-body: '<white>Nhập tên hiển thị mới cho rương này.'
  name-label: '<white>Tên hiển thị'
  save-name: '<green>✔ <white>Lưu'
  cancel: '<red>✖ <white>Hủy'

  # ===== Hộp thoại chọn biểu tượng =====
  icon-title: '<white>Chọn Biểu Tượng'
  # {count} = số vật phẩm khớp (cuộn danh sách để xem thêm).
  icon-body: '<white>{count} vật phẩm — nhập tên rồi nhấn Tìm để lọc. Cuộn để xem.'
  icon-search-label: '<white>Tìm'
  icon-search: '<white>Tìm'
  icon-default: '<white>Mặc định'
  icon-default-desc: '<white>Hiển thị rương này không có biểu tượng.'
