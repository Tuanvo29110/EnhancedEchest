name: EnhancedEchest
version: '${version}'
main: com.enhancedechest.EnhancedEchestPlugin
bootstrapper: com.enhancedechest.EnhancedEchestBootstrap
api-version: '1.21'
author: Nighter
description: Gives every player a double-size ender chest backed by a persistent database

permissions:
  enhancedechest.command.open:
    description: Open the ender chest GUI via command (/enderchest, /eclist). Block right-click never needs this.
    default: op
  # Admin commands require the base node AND the command-specific node below (no inheritance).
  enhancedechest.admin:
    description: Base permission required for every /enhancedechest admin command
    default: op
  enhancedechest.admin.reload:
    description: Use /ee reload (also requires enhancedechest.admin)
    default: op
  enhancedechest.admin.migrate.run:
    description: Use /ee migrate run (also requires enhancedechest.admin)
    default: op
  enhancedechest.admin.add:
    description: Use /ee add (also requires enhancedechest.admin)
    default: op
  enhancedechest.admin.resize:
    description: Use /ee resize (also requires enhancedechest.admin)
    default: op
  enhancedechest.admin.delete:
    description: Use /ee delete (also requires enhancedechest.admin)
    default: op
