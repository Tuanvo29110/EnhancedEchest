name: EnhancedEChest
version: '${version}'
main: com.enhancedechest.EnhancedEChestPlugin
bootstrapper: com.enhancedechest.EnhancedEChestBootstrap
api-version: '1.21'
description: Gives every player a double-size ender chest backed by a persistent database

permissions:
  ee.use:
    description: Allows opening the custom enderchest via block or command
    default: op
  ee.admin.migrate.run:
    description: Run migration for a specific player or all players
    default: op
  ee.admin.reload:
    description: Reload the plugin configuration
    default: op
