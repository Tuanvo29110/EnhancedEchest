name: EnhancedEChest
version: '${version}'
main: com.enhancedechest.EnhancedEChestPlugin
bootstrapper: com.enhancedechest.EnhancedEChestBootstrap
api-version: '1.21'
author: Nighter
description: Gives every player a double-size ender chest backed by a persistent database

permissions:
  enhancedechest.command.open:
    description: Open the ender chest GUI via command (/enderchest, /eclist). Block right-click never needs this.
    default: op
  enhancedechest.admin.migrate.run:
    description: Run migration for a specific player or all players
    default: op
  enhancedechest.admin.reload:
    description: Reload the plugin configuration
    default: op
  enhancedechest.admin:
    description: Base permission for all /enhancedechest admin commands
    default: op
    children:
      enhancedechest.admin.migrate.run: true
      enhancedechest.admin.reload: true
