name: EnhancedEChest
version: '${version}'
main: com.enhancedechest.EnhancedEChestPlugin
api-version: '1.21'
description: Gives every player a double-size ender chest backed by a persistent database

commands:
  ec:
    description: Open your enhanced enderchest
    aliases: [ enderchest ]
    usage: /ec
    permission: ee.use
  enhancedechest:
    description: EnhancedEChest admin commands
    aliases: [ ee ]
    usage: /enhancedechest <migrate run> | reload
    permission: ee.admin

permissions:
  ee.use:
    description: Allows opening the custom enderchest via block or command
    default: op
  ee.admin.migrate.run:
    description: Run migration for a specific player or all players
    default: op
  ee.admin.reload:
    description: Reload the plugin configuration
    default: op
  ee.admin:
    description: All EnhancedEChest admin permissions
    default: op
    children:
      ee.admin.migrate.run: true
      ee.admin.reload: true
