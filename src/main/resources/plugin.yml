name: EnhancedEChest
version: '${version}'
main: com.enhancedechest.EnhancedEChestPlugin
api-version: '1.21'
author: Nighter
description: Gives every player a double-size ender chest backed by a persistent database

commands:
  ec:
    description: Open your enhanced enderchest
    aliases: [ enderchest ]
    usage: /ec [list | #<index> | <name>]
    permission: ec.use
  eclist:
    description: Open your enhanced enderchest management menu
    usage: /eclist
    permission: ec.use
  enhancedechest:
    description: EnhancedEChest admin commands
    aliases: [ ee ]
    usage: /enhancedechest <migrate run> | reload
    permission: ee.admin

permissions:
  ec.use:
    description: Base permission for all /ec player commands (open, list, open by index/name)
    default: op
  ee.admin.migrate.run:
    description: Run migration for a specific player or all players
    default: op
  ee.admin.reload:
    description: Reload the plugin configuration
    default: op
  ee.admin:
    description: Base permission for all /ee admin commands
    default: op
    children:
      ee.admin.migrate.run: true
      ee.admin.reload: true
